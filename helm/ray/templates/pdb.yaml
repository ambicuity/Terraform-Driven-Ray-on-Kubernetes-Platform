{{- if .Values.cpuWorkers.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "ray-cluster.fullname" . }}-cpu-workers
  namespace: {{ .Release.Namespace }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      ray.io/node-type: worker
      ray.io/resource-type: cpu
---
{{- end }}
{{- if .Values.gpuWorkers.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "ray-cluster.fullname" . }}-gpu-workers
  namespace: {{ .Release.Namespace }}
spec:
  minAvailable: 0
  selector:
    matchLabels:
      ray.io/node-type: worker
      ray.io/resource-type: gpu
{{- end }}
