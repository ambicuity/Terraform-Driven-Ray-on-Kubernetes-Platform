name: Contributor Greeting

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  greet:
    name: Welcome New Contributor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v3
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          issue_message: |
            Welcome to **Terraform-Driven Ray on Kubernetes**.

            Thanks for opening your first issue.

            A maintainer will review this shortly. In the meantime:
            - Review the [README](https://github.com/${{ github.repository }}#readme) for project context
            - Review the [contributor guide](https://github.com/${{ github.repository }}/blob/main/CONTRIBUTING.md) for local validation steps
            - Add reproduction steps, environment details, and expected versus actual behavior if more context is available
          pr_message: |
            Welcome to **Terraform-Driven Ray on Kubernetes**.

            Thanks for your first pull request.

            A few repo-specific checks to keep in mind:
            - Review [CONTRIBUTING.md](https://github.com/${{ github.repository }}/blob/main/CONTRIBUTING.md) and run the scoped checks that match your changes
            - Workflow changes should pass `actionlint`, automation changes should pass `pytest tests -q`, and docs changes should avoid stale workflow references
            - Please keep the PR title in [Conventional Commits](https://www.conventionalcommits.org/) format

            A maintainer will review this soon.
