name: Stale Issue & PR Bot

on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

jobs:
  stale:
    name: Mark & Close Stale Items
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - uses: actions/stale@v9
        with:
          days-before-issue-stale: 60
          days-before-issue-close: 14
          stale-issue-label: 'stale'
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not
            had any activity for 60 days. It will be closed in 14 days unless
            further activity occurs. Comment or add the `keep-open` label to
            prevent closure.
          close-issue-message: >
            This issue was automatically closed due to inactivity.
            Please reopen if it is still relevant.
          days-before-pr-stale: 30
          days-before-pr-close: 14
          stale-pr-label: 'stale'
          stale-pr-message: >
            This PR has been automatically marked as stale because it has not
            had any activity for 30 days. It will be closed in 14 days unless
            revived by a push, review, or comment.
          close-pr-message: >
            This PR was automatically closed due to inactivity. Please reopen
            if you intend to continue the work.
          exempt-issue-labels: 'keep-open,pinned,security,in-progress,status/in-progress,status/blocked,status/needs-info,good first issue,beginner,intermediate,advanced'
          exempt-pr-labels: 'keep-open,pinned,security,in-progress,status/in-progress'
          exempt-all-assignees: true
